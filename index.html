<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meus Links VIP</title>
    <style>
        /* --- CONFIGURAÇÕES DO FUNDO (IMAGE BACKGROUND) --- */
        body {
            /* 1. TROQUE O NOME ABAIXO PELO NOME DO SEU ARQUIVO DE FUNDO NO GITHUB */
            background-image: url('fundo.jpg');
            
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* Camada escura opcional sobre a imagem para ajudar a leitura */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); /* 40% de preto. Aumente se o fundo for muito claro. */
            z-index: -1;
        }

        .main-container {
            width: 100%;
            max-width: 450px; /* Largura ideal para celular */
            padding: 0 0 40px 0; /* Sem padding no topo para o banner encostar */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- ESTILO DO BANNER DO TOPO --- */
        .top-banner {
            width: 100%;
            width: 100vw; /* Ocupa a largura total da tela do celular */
            max-width: 450px; /* Mas respeita o container central */
            height: auto; /* Mantém a proporção da imagem */
            aspect-ratio: 16/9; /* Proporção horizontal padrão (pode mudar se sua imagem for diferente) */
            object-fit: cover;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 25px; /* Espaço até o título */
        }

        h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            font-size: 1.8rem;
            text-align: center;
            padding: 0 20px; /* Padding nas laterais para o título não encostar */
        }

        /* --- ESTILO DOS CARDS DE LINK --- */
        .link-card {
            width: 90%; /* Ocupa 90% da largura do container para dar um respiro nas laterais */
            background: rgba(255, 255, 255, 0.9); /* Branco 90% transparente */
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .link-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.4);
            background: rgba(255, 255, 255, 1);
        }

        .link-card a {
            display: flex;
            align-items: center;
            text-decoration: none;
            padding: 12px;
        }

        .link-card img {
            width: 65px;
            height: 65px;
            border-radius: 8px;
            object-fit: cover;
            margin-right: 18px;
            border: 1px solid #ddd;
        }

        .link-card span {
            color: #1a1a1a;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: -0.5px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <img src="banner.jpg" alt="Banner Principal" class="top-banner">

        <h1>Confira as Novidades VIP</h1>

        <div class="link-card">
            <a href="https://dub.sh/produto1" target="_blank">
                <img src="foto1.jpg" alt="Produto 1">
                <span>PLATAFORMA F12 ACESSE AKI </span>
            </a>
        </div>

        <div class="link-card">
            <a href="https://dub.sh/produto2" target="_blank">
                <img src="foto2.jpg" alt="Produto 2">
                <span>PLATAFORMA PIX DA SORTE</span>
            </a>
        </div>

        <div class="link-card">
            <a href="https://dub.sh/produto3" target="_blank">
                <img src="foto3.jpg" alt="Produto 3">
                <span>PLATAFORMA VUPI</span>
            </a>
        </div>
        
        <div class="link-card">
            <a href="https://dub.sh/produto4" target="_blank">
                <img src="foto4.jpg" alt="Produto 4">
                <span> PLATAFORMA SUPERBET</span>
            </a>
        </div>

        <div class="link-card">
            <a href="#" target="_blank">
                <img src="foto5.jpg" alt="Produto 5">
                <span>Adicionar Título do Link 5</span>
            </a>
        </div>

        </div>

</body>
</html>
